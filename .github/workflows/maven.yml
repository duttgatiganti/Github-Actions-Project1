# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time


name: CICD Test1

on:
  push:
    branches: [ "main" ]


jobs:
  Job1-compile:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4   # cloning git
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn compile package
    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/*.jar
        
  Job2-trivy:
    runs-on: ubuntu-latest
    needs: Job1-compile

    steps:
    - uses: actions/checkout@v4   # cloning git

    - name: install trivy
      run: |
        sudo apt-get install wget gnupg
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy
    #- name: trivy scan
    #  run: trivy fs --format table -o trivy.json .
    - name: gitleaks install
      run: sudo apt install gitleaks -y
    - name: gitleaks scan
      run: gitleaks detect source . -r gl.json -f json .
  Job3-docker:
    runs-on: ubuntu-latest
    needs: Job2-trivy

    steps:
    - uses: actions/checkout@v4   # cloning git

   
    - name: download artifact
      uses: actions/download-artifact@v4
      with:
        name: app-jar
        path: app
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up QEMU  # to build any kind of images without errors
      uses: docker/setup-qemu-action@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: dutt1/gtac:latest
        file: ./Dockerfile
  job4-deploy-to-aks:
    runs-on: ubuntu-latest
    needs: Job3-docker

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: |
          {
            "clientId":"${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId":"${{ secrets.AZURE_TENANT_ID }}"
          }

    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
          --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
          --name ${{ secrets.AKS_CLUSTER_NAME }} \
          --overwrite-existing

    - name: Verify Cluster Access
      run: kubectl get nodes

    - name: Apply Manifests
      run: |
        kubectl apply -f ds.yml

 
